appId: com.edoc.viewer
productName: Edoc Viewer
copyright: Copyright © 2026
electronVersion: 30.5.1
npmRebuild: false
buildDependenciesFromSource: false
# Disable auto-update metadata (CI injects GITHUB_TOKEN automatically).
publish: null
generateUpdatesFilesForAllChannels: false
dmg:
  writeUpdateInfo: false
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - package.json
asarUnpack:
  - dist/checkserver.js
  - dist/renderer/pdf.worker.mjs
win:
  target:
    - target: portable
      arch:
        - x64
  signAndEditExecutable: false
  artifactName: ${productName}-${version}.${ext}
mac:
  target:
    - target: dmg
      arch:
        - universal
  artifactName: Edoc-Viewer-${version}.${ext}
  category: public.app-category.productivity
  gatekeeperAssess: false
  hardenedRuntime: false
linux:
  target:
    - target: AppImage
      arch:
        - x64
  executableName: edoc-viewer
  artifactName: ${productName}-${version}.${ext}
  category: Office
  maintainer: Edoc Viewer
fileAssociations:
  - ext: edoc
    name: Encrypted Document
    description: Edoc encrypted document
    mimeType: application/x-edoc
protocols:
  - name: Edoc Document
    schemes:
      - edoc
